<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#05050a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#05050a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(124,58,237,0.15)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Q monogram -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="130" font-weight="900" fill="url(#g1)" letter-spacing="-4">Q</text>
  <!-- Company name -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="54" font-weight="900" fill="#f1f5f9" letter-spacing="-2">Quantum Consulting</text>
  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="1">Formation IA &amp; Consulting pour entreprises</text>
  <!-- Separator -->
  <rect x="520" y="420" width="160" height="1.5" fill="url(#g1)" opacity="0.6" rx="1"/>
  <!-- URL -->
  <text x="600" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="500" fill="rgba(148,163,184,0.6)" letter-spacing="1">quantum-agency.fr</text>
</svg>
