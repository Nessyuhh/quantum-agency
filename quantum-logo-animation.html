<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Consulting — Animation Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#030308;display:flex;align-items:center;justify-content:center;font-family:'Inter',system-ui,sans-serif}

/* ─── Conteneur centré ──────────────────────────────────── */
.stage{display:flex;align-items:center;justify-content:center;width:100vw;height:100vh}
#logo-group{display:flex;align-items:center}

/* ─── Rings ───────────────────────────────────────────────── */
.ring{transform-box:view-box;transform-origin:50% 50%}
#ring1{animation:spin-cw  3.2s linear infinite}
#ring2{animation:spin-ccw 5.1s linear infinite}
#ring3{animation:spin-cw  4.3s linear infinite}
@keyframes spin-cw  {to{transform:rotate( 360deg)}}
@keyframes spin-ccw {to{transform:rotate(-360deg)}}

/* ─── Orbital collapse ────────────────────────────────────── */
#orb-wrap{
  transform-box:view-box;transform-origin:50% 50%;
  transition:transform 1.4s cubic-bezier(.55,.06,.68,.19),
             opacity   1.4s cubic-bezier(.55,.06,.68,.19);
}
#orb-wrap.collapsing{transform:scale(0);opacity:0}

/* ─── Nucleus ─────────────────────────────────────────────── */
#nucleus{
  transform-box:view-box;transform-origin:50% 50%;
  transition:transform .6s ease-out,filter .6s ease-out;
}
#nucleus.brightening{
  transform:scale(2.5);
  filter:drop-shadow(0 0 8px #fff) drop-shadow(0 0 16px #a855f7);
}

/* ─── Q arc : iris reveal (clip-path) ────────────────────── */
#q-arc-wrap{clip-path:circle(0% at 50% 50%)}
#q-arc-wrap.revealing{animation:revealArc 1.1s cubic-bezier(.22,1,.36,1) forwards}
@keyframes revealArc{
  from{clip-path:circle(0%  at 50% 50%)}
  to  {clip-path:circle(78% at 50% 50%)}
}

/* ─── Q tail : stroke-dashoffset ─────────────────────────── */
#q-tail{stroke-dasharray:38.2;stroke-dashoffset:38.2;opacity:0}
#q-tail.drawing{animation:tailDraw .7s cubic-bezier(.22,1,.36,1) forwards}
@keyframes tailDraw{
  0%  {stroke-dashoffset:38.2;opacity:1}
  100%{stroke-dashoffset:0;   opacity:1}
}

/* ─── Glow au repos ───────────────────────────────────────── */
.done-glow{animation:qGlow 3s ease-in-out infinite}
@keyframes qGlow{
  0%,100%{filter:drop-shadow(0 0 4px rgba(168,85,247,.35))}
  50%    {filter:drop-shadow(0 0 16px rgba(168,85,247,.75)) drop-shadow(0 0 30px rgba(34,211,238,.3))}
}

/* ─── Wordmark (caché = max-width 0 + margin 0) ──────────── */
#wordmark{
  display:flex;flex-direction:column;gap:.5rem;
  max-width:0;overflow:hidden;
  margin-left:0;
  opacity:0;
  white-space:nowrap;
  /* La transition sur max-width + margin fait glisser le Q vers la gauche */
  transition:
    max-width 1.1s cubic-bezier(.22,1,.36,1),
    margin-left .9s cubic-bezier(.22,1,.36,1),
    opacity .8s ease-out;
}
#wordmark.visible{
  max-width:420px;
  margin-left:3rem;
  opacity:1;
}
#wm-quantum{font-size:2.7rem;font-weight:800;letter-spacing:.14em;color:#e2e8f0;line-height:1}
#wm-sep{
  height:1px;
  background:linear-gradient(90deg,rgba(124,58,237,.5),rgba(6,182,212,.25));
  width:0;transition:width 1s ease-out .4s;
}
#wordmark.visible #wm-sep{width:100%}
#wm-consulting{font-size:1.15rem;font-weight:300;letter-spacing:.48em;color:#64748b;line-height:1}

/* ─── Replay ───────────────────────────────────────────────── */
#replay{
  position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);
  font-family:inherit;font-size:.65rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  color:#475569;background:none;
  border:1px solid rgba(255,255,255,.07);border-radius:100px;
  padding:.55rem 1.4rem;cursor:pointer;
  opacity:0;transition:opacity .6s ease-out,color .2s,border-color .2s;
}
#replay.visible{opacity:1}
#replay:hover{color:#a855f7;border-color:rgba(124,58,237,.35)}
</style>
</head>
<body>

<div class="stage">
  <div id="logo-group">

    <svg viewBox="0 0 100 100" width="240" height="240" fill="none" overflow="visible">
      <defs>
        <linearGradient id="og1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="rgba(168,85,247,.1)"/>
          <stop offset="50%"  stop-color="rgba(168,85,247,.9)"/>
          <stop offset="100%" stop-color="rgba(168,85,247,.1)"/>
        </linearGradient>
        <linearGradient id="og2" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="rgba(34,211,238,.1)"/>
          <stop offset="50%"  stop-color="rgba(34,211,238,.8)"/>
          <stop offset="100%" stop-color="rgba(34,211,238,.1)"/>
        </linearGradient>
        <linearGradient id="og3" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="rgba(192,132,252,.1)"/>
          <stop offset="50%"  stop-color="rgba(192,132,252,.75)"/>
          <stop offset="100%" stop-color="rgba(192,132,252,.1)"/>
        </linearGradient>
        <linearGradient id="qGrad" x1="10%" y1="10%" x2="90%" y2="90%">
          <stop offset="0%"   stop-color="#ddd6fe"/>
          <stop offset="50%"  stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#22d3ee"/>
        </linearGradient>
        <radialGradient id="nucGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#fff"/>
          <stop offset="60%"  stop-color="#c4b5fd"/>
          <stop offset="100%" stop-color="rgba(168,85,247,0)"/>
        </radialGradient>
      </defs>

      <!-- Phase 1+2 : Orbitales -->
      <g id="orb-wrap">
        <g id="ring1" class="ring">
          <ellipse cx="50" cy="50" rx="37" ry="14" stroke="url(#og1)" stroke-width="1.4"/>
        </g>
        <g id="ring2" class="ring">
          <ellipse cx="50" cy="50" rx="37" ry="14" stroke="url(#og2)" stroke-width="1.4" transform="rotate(60 50 50)"/>
        </g>
        <g id="ring3" class="ring">
          <ellipse cx="50" cy="50" rx="37" ry="14" stroke="url(#og3)" stroke-width="1.4" transform="rotate(120 50 50)"/>
        </g>
        <circle cx="50" cy="50" r="10" fill="rgba(168,85,247,.07)"/>
        <circle id="nucleus" cx="50" cy="50" r="4.5" fill="url(#nucGrad)"/>
      </g>

      <!-- Phase 4a : Arc Q via iris clip-path -->
      <g id="q-arc-wrap">
        <path id="q-arc"
              d="M 68 81.2 A 36 36 0 1 1 81.2 68"
              stroke="url(#qGrad)" stroke-width="2.5" stroke-linecap="round"/>
      </g>

      <!-- Phase 4b : Queue -->
      <line id="q-tail"
            x1="60" y1="62" x2="88" y2="88"
            stroke="url(#qGrad)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>

    <div id="wordmark">
      <span id="wm-quantum">QUANTUM</span>
      <div id="wm-sep"></div>
      <span id="wm-consulting">CONSULTING</span>
    </div>

  </div>
</div>

<button id="replay">↺ Rejouer</button>

<script>
(function(){
  const orbWrap  = document.getElementById('orb-wrap');
  const nucleus  = document.getElementById('nucleus');
  const arcWrap  = document.getElementById('q-arc-wrap');
  const qArc     = document.getElementById('q-arc');
  const qTail    = document.getElementById('q-tail');
  const wordmark = document.getElementById('wordmark');
  const replay   = document.getElementById('replay');

  function reset(){
    orbWrap.classList.remove('collapsing');
    nucleus.classList.remove('brightening');
    arcWrap.classList.remove('revealing');
    arcWrap.style.clipPath = '';
    qArc.classList.remove('done-glow');
    qTail.classList.remove('drawing','done-glow');
    qTail.style.animation = '';
    wordmark.classList.remove('visible');
    replay.classList.remove('visible');
    void orbWrap.offsetWidth;
    void qTail.offsetWidth;
  }

  function run(){
    reset();

    // Convergence à 1.8s (réduit vs 2.5s)
    setTimeout(()=>{
      orbWrap.classList.add('collapsing');
      nucleus.classList.add('brightening');
    }, 1800);

    // Iris : cercle grossit à 3.3s
    setTimeout(()=>{ arcWrap.classList.add('revealing'); }, 3300);

    // Verrouiller clip-path + déclencher queue à 4.45s
    setTimeout(()=>{
      arcWrap.style.clipPath = 'circle(100% at 50% 50%)';
      arcWrap.classList.remove('revealing');
      qTail.classList.add('drawing');
    }, 4450);

    // Wordmark slide-in à 4.7s
    setTimeout(()=>{ wordmark.classList.add('visible'); }, 4700);

    // Glow + replay à 5.7s
    setTimeout(()=>{
      qArc.classList.add('done-glow');
      qTail.classList.add('done-glow');
      replay.classList.add('visible');
    }, 5700);
  }

  run();
  replay.addEventListener('click', ()=>{ replay.classList.remove('visible'); setTimeout(run, 80); });
})();
</script>
</body>
</html>
